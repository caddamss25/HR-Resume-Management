# =============================
# Server
# =============================
server.port=${PORT:8080}

# ===============================
# DATABASE CONFIGURATION
# ===============================

spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=com.dbeaver.jdbc.driver.libsql.LibSqlDriver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.open-in-view=false
server.tomcat.relaxed-query-chars=|,{,},[,]

# HikariCP configuration for LibSQL (which doesn't support JDBC isValid and setAutoCommit)
spring.datasource.hikari.connection-test-query=SELECT 1
spring.datasource.hikari.auto-commit=true

# Tell Hibernate that the connection provider handles autocommit to avoid manual toggling
spring.jpa.properties.hibernate.connection.provider_disables_autocommit=true
spring.jpa.properties.hibernate.connection.autocommit=true

# Additional Turso/SQLite compatibility
spring.jpa.properties.hibernate.jdbc.batch_size=0




# =============================
# File Upload Limits (50+ files)
# =============================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=500MB

# =============================
# JWT
# =============================
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# =============================
# Cloudinary
# =============================
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}

# =============================
# CORS — Frontend Origin
# =============================
frontend.url=${FRONTEND_URL:http://localhost:5173}

# =============================
# Logging
# =============================
logging.level.com.rms=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate=WARN
