# =============================
# Server
# =============================
server.port=${PORT:8080}

# ===============================
# DATABASE CONFIGURATION
# ===============================

spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
server.tomcat.relaxed-query-chars=|,{,},[,]

# Connection pool tuning for Supabase
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=600000
spring.datasource.hikari.keepalive-time=60000



# =============================
# File Upload Limits (50+ files)
# =============================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=500MB

# =============================
# JWT
# =============================
jwt.secret=${JWT_SECRET:9ce4dbe7-a1fd-4ffc-8b93-276606ce0ee6}
jwt.expiration=86400000

# =============================
# Cloudinary
# =============================
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:dsevkp7rt}
cloudinary.api-key=${CLOUDINARY_API_KEY:298684146784964}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:7mLggKfvYy2eKYUVhYFN4DfRJyA}

# =============================
# CORS — Frontend Origin
# =============================
frontend.url=${FRONTEND_URL:http://localhost:5173}

# =============================
# Logging
# =============================
logging.level.com.rms=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate=WARN
