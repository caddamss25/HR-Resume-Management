# =============================
# Server
# =============================
server.port=${PORT:8080}

# =============================
# Supabase Database (PostgreSQL)
# =============================
spring.datasource.url=${DB_URL:jdbc:postgresql://db.rxxvgwolyjizraswfffe.supabase.co:5432/postgres?sslmode=require}
spring.datasource.password=${DB_PASSWORD:Caddamtech70@}
spring.datasource.driver-class-name=org.postgresql.Driver


spring.datasource.hikari.data-source-properties.ssl=true
spring.datasource.hikari.data-source-properties.sslmode=require

# Connection pool tuning for Supabase
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=600000
spring.datasource.hikari.keepalive-time=60000

# =============================
# JPA / Hibernate
# =============================
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.default_schema=public

# =============================
# File Upload Limits (50+ files)
# =============================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=500MB

# =============================
# JWT
# =============================
jwt.secret=${JWT_SECRET:9ce4dbe7-a1fd-4ffc-8b93-276606ce0ee6}
jwt.expiration=86400000

